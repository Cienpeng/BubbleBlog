services:
  caddy:
    image: caddy:alpine
    ports:
      - "80:80"
      - "443:443"
    mem_limit: 32M
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    restart: unless-stopped

  bun:
    build: .
    mem_limit: 256M
    env_file: .env
    volumes:
      - ./uploads:/app/uploads
    restart: unless-stopped

volumes:
  caddy_data:
